<section class="hero">
    <h1>Email Writer</h1>
    <p>Generate professional emails for work, inquiries, or personal use.</p>
</section>

<section class="tools-grid">
    <textarea id="emailInput" placeholder="Enter your message details or context..." rows="8"></textarea>
    <button onclick="generateTool('emailInput','emailOutput','email')">Generate Email</button>
    <textarea id="emailOutput" placeholder="AI-generated email will appear here..." rows="12" readonly></textarea>
    <div class="tool-actions">
        <button onclick="copyOutput('emailOutput')">Copy</button>
        <button onclick="downloadPDF('emailOutput','Email')">Download PDF</button>
    </div>
</section>

<script src="/docx/index.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
