<!DOCTYPE html>
<html lang="en">
<head>

<title>Paraphraser - AI Tools Hub</title>

<body>

<nav>
    <div class="logo">AI Tools Hub</div>
    <div class="nav-links">
        <a href="../index.html">Home</a>

<section class="hero">
    <h1>Paraphraser</h1>
    <p>Rewrite your text quickly and accurately with AI.</p>
</section>

<section class="tools-grid">
    <textarea id="paraphraserInput" placeholder="Enter your text here..." rows="8"></textarea>
    <button onclick="generateTool('paraphraserInput','paraphraserOutput','paraphrase')">Paraphrase</button>
    <textarea id="paraphraserOutput" placeholder="AI-generated paraphrased text will appear here..." rows="8" readonly></textarea>
    <div class="tool-actions">
        <button onclick="copyOutput('paraphraserOutput')">Copy</button>
        <button onclick="downloadPDF('paraphraserOutput','Paraphrased')">Download PDF</button>
    </div>
</section>

<script src="/docx/index.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<script src="../js/tools.js"></script>

</body>
</html>
