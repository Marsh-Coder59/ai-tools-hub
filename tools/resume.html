<section class="hero">
    <h1>Resume Generator</h1>
    <p>Create professional resumes instantly with AI.</p>
</section>

<section class="tools-grid">
    <textarea id="resumeInput" placeholder="Enter your experience, education, skills, contact details..." rows="8"></textarea>
    <button onclick="generateTool('resumeInput','resumeOutput','resume')">Generate Resume</button>
    <textarea id="resumeOutput" placeholder="Your AI-generated resume will appear here..." rows="12" readonly></textarea>
    <div class="tool-actions">
        <button onclick="copyOutput('resumeOutput')">Copy</button>
        <button onclick="downloadPDF('resumeOutput','Resume')">Download PDF</button>
    </div>
</section>

<script src="/docx/index.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
