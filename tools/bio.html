<section class="hero">
    <h1>Bio Generator</h1>
    <p>Create catchy bios for social media or professional profiles.</p>
</section>

<section class="tools-grid">
    <textarea id="bioInput" placeholder="Enter your details or personality..." rows="8"></textarea>
    <button onclick="generateTool('bioInput','bioOutput','bio')">Generate Bio</button>
    <textarea id="bioOutput" placeholder="AI-generated bio will appear here..." rows="12" readonly></textarea>
    <div class="tool-actions">
        <button onclick="copyOutput('bioOutput')">Copy</button>
        <button onclick="downloadPDF('bioOutput','Bio')">Download PDF</button>
    </div>
</section>
